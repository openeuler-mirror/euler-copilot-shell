# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# .goreleaser.yaml — Witty build configuration
#
# This config is used for LOCAL verification of builds on all target platforms.
# It is NOT used for openEuler RPM generation — that is handled by
# packaging/witty.spec (handwritten, Vendor + Go toolchain bundling).
#
# Quick validation:
#   goreleaser release --snapshot --clean --skip=publish

version: 2

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: witty
    main: ./cmd/witty
    binary: witty
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

# ── Archives (tarballs) ────────────────────────────────────────────────────

archives:
  - id: binary
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md
      - packaging/config.toml
      - packaging/witty.bash-completion
      - packaging/profile.d/witty.sh

  - id: source
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}
    files:
      - src: "**/*.go"
      - src: "go.mod"
      - src: "go.sum"
      - src: "cmd/**"
      - src: "internal/**"
      - src: "api/**"
      - src: "test/**"
      - src: "packaging/**"
      - src: "scripts/**"
      - src: "LICENSE"
      - src: "README.md"
      - src: ".goreleaser.yaml"

# ── Checksums ──────────────────────────────────────────────────────────────

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# ── Changelog ──────────────────────────────────────────────────────────────

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

# ── Release metadata ───────────────────────────────────────────────────────

release:
  github:
    owner: openeuler
    name: euler-copilot-shell
  prerelease: auto
  footer: |
    ## RPM Packaging (openEuler)

    The official openEuler RPM is built from `packaging/euler-copilot-shell.spec` using the
    Vendor + Go toolchain bundling approach. See `docs/development/rpm-packaging-design.md`
    for details.

# NOTE: nfpms section intentionally removed.
# nFPM-generated RPMs are unsuitable for openEuler CI because:
#   - nFPM needs network access to download Go module dependencies.
#   - openEuler CI is offline and only supports Source0..N + rpmbuild.
#   - The hand-written packaging/witty.spec handles RPM generation correctly.
